<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/admin.css">
    <title>Administración</title>

<body>
    <main>
        <div class="triple-back">
            <div class="doble-back">
                <form>
                    <h3>Ingrese la superkey</h3>
                    <div>
                        <label for="username">Nombre de usuario</label><br>
                        <input type="text" name="username" id="log-username" required><br><br>

                        <label for="password">Superkey</label><br>
                        <input type="password" name="password" id="log-password" required><br><br>

                    </div>
                    <div class="buttons">
                        <button type="button" id="log-button" class="button-1">Enviar</button>
                        <a href="index.html" class="button-1">Cancelar</a>
                    </div>
                    <a class="link" href="singin.html">Si no tienes cuenta da click aquí</a>
                </form>
            </div>
        </div>
    </main>
    <div class="registers" id="registers">
        <div class="grafic-div">
            <canvas id="grafic"></canvas>
        </div>
        <div class="table-div">
            <table>
                <thead>
                    <th>Usuario</th>
                    <th>Numero de control</th>
                    <th>Resultados</th>
                </thead>
                <tbody id="table">

                </tbody>
            </table>
        </div>
    </div>
    <footer>
        <div class="fot-background2">
            <div class="footer-box">
                <h3>Administración</h3>
                <h4>Equipo de desarrollo:</h4>
                <ul>
                   <li>André-wireframe: Desarrollador</li>
                </ul>
            </div>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>
</body>
</html>
