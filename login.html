<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Inicio de sesion</title>
</head>
<body>
    <main>
        <div class="triple-back">
            <div class="doble-back">
                <form>
                    <h3>Ingrese sus credenciales</h3>
                    <div>
                        <label for="username">Nombre de usuario</label><br>
                        <input type="text" name="username" id="log-username" required><br><br>

                        <label for="password">Contraseña</label><br>
                        <input type="password" name="password" id="log-password" required><br><br>

                    </div>
                    <div class="buttons">
                        <button type="button" id="log-button" class="button-1">Enviar</button>
                        <a href="index.html" class="button-1">Cancelar</a>
                    </div>
                    <a class="link" href="singin.html">Si no tienes cuenta da click aqui</a>
                </form>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/login.js"></script>
</body>
</html>
