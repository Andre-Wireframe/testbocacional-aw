<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Registro</title>
</head>
<body>
    <main>
        <div class="triple-back">
            <div class="doble-back">
                <form>
                    <h3>Crea un nuevo usuario</h3>
                    <div>
                        <label for="username">Nombre de usuario</label><br>
                        <input type="text" name="username" id="sing-username" required><br><br>

                        <label for="password">Contraseña</label><br>
                        <input type="password" name="password" id="sing-password" required><br><br>

                        <label for="ncontrol">Numero de control</label><br>
                        <input type="number" name="ncontrol" id="ncontrol" required><br><br>
                    </div>
                    <div class="buttons">
                        <button id="sing-button" type="button" class="button-1">Enviar</button>
                        <a href="index.html" class="button-1">Cancelar</a>
                    </div>
                    <a class="link" href="login.html">Si ya tienes cuenta da click aquí</a>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/singin.js"></script>
</body>
</html>
